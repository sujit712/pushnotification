<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a7cff" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <link rel="manifest" href="/manifest.json" />
    <title>Hello Web Push PWA</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #111827;
      }
      main {
        width: min(560px, 92vw);
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      p {
        line-height: 1.5;
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        background: #0a7cff;
        color: #fff;
        font-size: 15px;
      }
      button.secondary {
        background: #111827;
      }
      #status {
        margin-top: 18px;
        padding: 10px;
        border-radius: 8px;
        background: #eef2ff;
        white-space: pre-wrap;
      }
      code {
        background: #f3f4f6;
        border-radius: 6px;
        padding: 1px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello Web Push PWA</h1>
      <p>
        Tap <strong>Enable Notifications</strong> on each device/browser profile.
      </p>
      <p>Send actions are available in the protected admin subscriptions page.</p>
      <p>
        iPhone note: must be opened as installed PWA (Add to Home Screen) over HTTPS.
      </p>
      <div class="actions">
        <button id="enableBtn">Enable Notifications</button>
      </div>
      <div id="status" aria-live="polite">Ready.</div>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
